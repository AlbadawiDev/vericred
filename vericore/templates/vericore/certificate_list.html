{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h2>Certificates</h2><a href="{% url 'certificate_create' %}" class="btn btn-primary">New</a></div>
<form method="get" class="row g-2 mb-3">
  <div class="col-md-5"><input type="text" class="form-control" name="q" value="{{ query }}" placeholder="Search by student, course, institution, UUID"></div>
  <div class="col-md-3"><select name="status" class="form-select"><option value="">All statuses</option>{% for value,label in status_choices %}<option value="{{ value }}" {% if selected_status == value %}selected{% endif %}>{{ label }}</option>{% endfor %}</select></div>
  <div class="col-md-2"><button class="btn btn-outline-secondary w-100">Filter</button></div>
</form>
<table class="table table-hover bg-white">
  <thead><tr><th>Student</th><th>Course</th><th>Status</th><th>Issue Date</th><th></th></tr></thead>
  <tbody>
    {% for cert in certificates %}
      <tr><td>{{ cert.student_name }}</td><td>{{ cert.course_name }}</td><td><span class="badge text-bg-secondary">{{ cert.status }}</span></td><td>{{ cert.issue_date }}</td><td><a href="{% url 'certificate_detail' cert.pk %}">View</a></td></tr>
    {% empty %}<tr><td colspan="5">No certificates found.</td></tr>{% endfor %}
  </tbody>
</table>
{% endblock %}
