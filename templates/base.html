<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VeriCred</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'dashboard' %}">VeriCred</a>
    <div class="navbar-nav ms-auto">
      {% if user.is_authenticated %}
      <a class="nav-link" href="{% url 'certificate_list' %}">Certificates</a>
      <a class="nav-link" href="{% url 'audit_log_list' %}">Audit Logs</a>
      <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button class="btn btn-sm btn-outline-light ms-2">Logout</button></form>
      {% endif %}
    </div>
  </div>
</nav>
<div class="container">
    {% for message in messages %}
    <div class="alert alert-info">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
